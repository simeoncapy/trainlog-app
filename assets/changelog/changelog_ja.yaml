changelog_ja:
  - version: 0.4.1
    date: 2026-07-21
    changes:
      - type: feature
        text: 設定で起動時に表示するページを変更できるオプションを追加。
      - type: feature
        text: アップデート後に前回からの変更点を表示する変更履歴機能を追加。
      - type: fix
        text: 所要時間がない経路の経路カードに00分と表示されないように修正。
      - type: fix
        text: 受信箱およびTrainlogステータスページのステータスバーアイコンがライトモードで表示されるように修正。
      - type: minor
        text: 統計グラフでアイコン（0〜9）の代わりに順位番号（1〜10）を表示するようになりました。
      - type: minor
        text: これからの（未来の）経路のタイムラインが破線で表示されるようになりました。
